<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI CASSETTE MACHINE 📼</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  :root{
    --bg:#0a0e0a;
    --panel:#11160f;
    --green:#4dff7c;
    --green-dim:#1f6e38;
    --amber:#ffb347;
    --red:#ff5a5a;
    --line:#1c2a1c;
    --scan:rgba(77,255,124,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--green);font-family:'Share Tech Mono',monospace;}
  body{
    min-height:100vh;padding:14px;
    background-image:
      repeating-linear-gradient(0deg, var(--scan) 0px, var(--scan) 1px, transparent 1px, transparent 3px);
    overflow-x:hidden;
  }
  .frame{
    max-width:560px;margin:0 auto;
    border:2px solid var(--green-dim);
    background:linear-gradient(180deg,#0c120c,#0a0e0a);
    box-shadow:0 0 0 1px #000, 0 0 40px rgba(77,255,124,0.08), inset 0 0 60px rgba(0,0,0,0.6);
    border-radius:6px;
  }
  header{
    padding:12px 14px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;
  }
  .reel{
    width:22px;height:22px;border:2px solid var(--green);border-radius:50%;
    position:relative;flex:none;
  }
  .reel::after{content:"";position:absolute;inset:6px;border:2px solid var(--green-dim);border-radius:50%;}
  .reel.spin{animation:spin 1.1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  h1{
    font-family:'VT323',monospace;font-size:26px;letter-spacing:1px;
    color:var(--green);text-shadow:0 0 8px rgba(77,255,124,0.5);font-weight:400;line-height:1;
  }
  h1 small{display:block;font-size:11px;color:var(--green-dim);letter-spacing:3px;font-family:'Share Tech Mono';}

  .tabs{display:flex;border-bottom:1px solid var(--line);}
  .tab{
    flex:1;padding:11px;text-align:center;cursor:pointer;font-size:13px;letter-spacing:1px;
    color:var(--green-dim);background:transparent;border:none;font-family:'Share Tech Mono';
    transition:.15s;
  }
  .tab.active{color:var(--bg);background:var(--green);text-shadow:none;font-weight:bold;}
  .tab:not(.active):active{background:var(--line);}

  .pane{padding:16px 14px;display:none;}
  .pane.active{display:block;}

  label.fld{display:block;font-size:11px;color:var(--green-dim);letter-spacing:2px;margin:14px 0 5px;text-transform:uppercase;}
  label.fld:first-child{margin-top:0;}

  .btn{
    width:100%;padding:13px;margin-top:8px;cursor:pointer;
    background:transparent;border:1px solid var(--green);color:var(--green);
    font-family:'Share Tech Mono';font-size:14px;letter-spacing:2px;border-radius:3px;
    transition:.12s;text-transform:uppercase;
  }
  .btn:active{background:var(--green);color:var(--bg);}
  .btn.primary{border-color:var(--amber);color:var(--amber);}
  .btn.primary:active{background:var(--amber);color:var(--bg);}
  .btn.rec{border-color:var(--red);color:var(--red);}
  .btn.rec:active{background:var(--red);color:var(--bg);}
  .btn:disabled{opacity:.3;cursor:not-allowed;}

  .row{display:flex;gap:8px;}
  .row .btn{margin-top:8px;}

  .seg{display:flex;gap:6px;margin-top:4px;}
  .seg button{
    flex:1;padding:9px;background:transparent;border:1px solid var(--green-dim);color:var(--green-dim);
    font-family:'Share Tech Mono';font-size:13px;border-radius:3px;cursor:pointer;transition:.12s;
  }
  .seg button.on{border-color:var(--green);color:var(--green);background:rgba(77,255,124,0.08);}

  input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--green-dim);border-radius:2px;margin-top:8px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--green);border-radius:2px;cursor:pointer;box-shadow:0 0 6px var(--green);}
  input[type=file]{display:none;}

  .canvas-wrap{
    margin-top:12px;display:flex;justify-content:center;align-items:center;
    background:#000;border:1px solid var(--line);border-radius:4px;padding:10px;position:relative;
  }
  canvas{image-rendering:pixelated;width:288px;height:288px;background:#000;display:block;}
  .preview-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .preview-grid .canvas-wrap{flex:1;min-width:130px;padding:6px;}
  .preview-grid canvas{width:130px;height:130px;}
  .caplabel{font-size:10px;color:var(--green-dim);text-align:center;margin-top:4px;letter-spacing:1px;}

  .console{
    margin-top:12px;background:#000;border:1px solid var(--line);border-radius:4px;
    padding:10px;height:120px;overflow-y:auto;font-size:12px;line-height:1.5;color:var(--green-dim);
    white-space:pre-wrap;word-break:break-all;
  }
  .console .ok{color:var(--green);}
  .console .warn{color:var(--amber);}
  .console .err{color:var(--red);}

  .status{
    margin-top:10px;padding:8px 10px;border:1px dashed var(--green-dim);border-radius:3px;
    font-size:12px;letter-spacing:1px;color:var(--amber);text-align:center;min-height:34px;
    display:flex;align-items:center;justify-content:center;
  }
  .status.live{border-color:var(--red);color:var(--red);animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{50%{opacity:.4;}}

  .meter{height:6px;background:var(--line);border-radius:3px;margin-top:8px;overflow:hidden;}
  .meter span{display:block;height:100%;width:0;background:var(--green);transition:width .05s;}

  .hint{font-size:11px;color:var(--green-dim);line-height:1.6;margin-top:12px;border-top:1px dashed var(--line);padding-top:10px;}
  .hint b{color:var(--green);}
  audio{width:100%;margin-top:10px;filter:invert(.85) hue-rotate(70deg) saturate(2);}
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="reel" id="reelL"></div>
    <div class="reel" id="reelR"></div>
    <h1>AI CASSETTE<small>DECK // ピーガガガー DATA SYSTEM</small></h1>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="tx">▶ つくる / TX</button>
    <button class="tab" data-tab="rx">◉ きく / RX</button>
  </div>

  <!-- ============ TX ============ -->
  <div class="pane active" id="pane-tx">
    <label class="fld">[1] 画像をよみこむ</label>
    <button class="btn" id="pickBtn">📂 画像ファイルを選択</button>

    <label class="fld">[2] 解像度（マス数）</label>
    <div class="seg" id="resSeg">
      <button data-res="16" class="on">16×16</button>
      <button data-res="24">24×24</button>
      <button data-res="32">32×32</button>
    </div>

    <label class="fld">[3] しきい値（白黒の境目）— <span id="thVal">128</span></label>
    <input type="range" id="thresh" min="20" max="235" value="128">

    <div class="preview-grid">
      <div>
        <div class="canvas-wrap"><canvas id="srcCanvas" width="120" height="120"></canvas></div>
        <div class="caplabel">SOURCE</div>
      </div>
      <div>
        <div class="canvas-wrap"><canvas id="bwCanvas" width="32" height="32"></canvas></div>
        <div class="caplabel">2-VALUE / 焼き付け</div>
      </div>
    </div>

    <label class="fld">[4] 音にする</label>
    <button class="btn primary" id="encBtn" disabled>🔊 ピーガガガー を生成</button>
    <div class="row">
      <button class="btn" id="playBtn" disabled>▶ 再生</button>
      <button class="btn" id="saveBtn" disabled>💾 WAV保存</button>
    </div>

    <div class="hint">
      <b>つかいかた：</b>画像→マス数→しきい値で焼き付け絵を整え、<b>生成</b>。再生してもう一台に聞かせるか、<b>WAV保存</b>してカセットに録音。ボロいテープほど味が出る📼
    </div>
  </div>

  <!-- ============ RX ============ -->
  <div class="pane" id="pane-rx">
    <label class="fld">受信 — マイクに「ピーガガガー」を聞かせる</label>
    <button class="btn rec" id="listenBtn">◉ 受信スタンバイ</button>
    <div class="status" id="rxStatus">―― 待機中 ――</div>
    <div class="meter"><span id="lvl"></span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px;color:var(--amber);letter-spacing:1px;">
      <span id="rxProgress">受信 0 行</span>
      <button class="btn" id="finalizeBtn" style="width:auto;margin:0;padding:7px 14px;font-size:12px;" disabled>■ 今ある分で確定</button>
    </div>

    <label class="fld" style="margin-top:12px;">マイク感度（弱い時は上げる）— ×<span id="gainVal">6</span></label>
    <input type="range" id="gainCtl" min="1" max="20" step="1" value="6">

    <div class="canvas-wrap" style="margin-top:14px;">
      <canvas id="rxCanvas" width="32" height="32"></canvas>
    </div>

    <div class="console" id="con"></div>

    <div class="hint">
      上から一行ずつ <b>ファクスのように</b> 刷り出されます。受信は<b>マス数自動判別</b>。メーターが振れない時は<b>マイク感度</b>を上げ、送信機に近づけてください。
    </div>
  </div>
</div>

<script>
/* =======================================================================
   AI CASSETTE MACHINE  —  音響データ伝送 (FSK)  一枚完結版
   設計: 高橋秀夫 / 配線: Claude
   ======================================================================= */

/* ---------- 信号パラメータ（送受で共有） ----------
   周波数は「人の声の帯域(300-3400Hz)」を避けて高域に置く。
   iPhoneマイクの音声最適化(ノイズ抑制/エコー消し)に消されにくくするため。 */
const SR        = 44100;          // サンプルレート(WAV保存用の名目値)
const F0         = 3200;           // bit=0 の周波数 (Hz)
const F1         = 4000;           // bit=1 の周波数 (Hz)
const F_SYNC     = 4800;           // 行頭シンクトーン (Hz)
const BIT_MS     = 32;             // 1ビットの長さ(ms) ← 長いほどノイズに強い
const LEAD_MS    = 600;            // 先頭リードトーン(F_SYNC)
const ROW_GAP_MS = 30;             // 行間の無音
const SYNC_MS    = 40;             // 各行頭シンク長
const samplesPerBit = Math.round(SR * BIT_MS / 1000);

/* 行フォーマット: [SYNC] [行番号8bit] [画素 N bit] [パリティ8bit]
   → 受信側は行番号で位置を確定。パリティで化け行を検出して"飛ばす". */

let GRID = 16;                     // 現在の解像度
let bwBits = null;                 // 焼き付け済み 2値ビット (Uint8 0/1) 長さ GRID*GRID
let srcImg = null;
let encodedWav = null;             // 生成済みWAV(Blob)
let audioCtx = null;

const $ = id => document.getElementById(id);
const log = (msg, cls='') => {
  const c = $('con'); const line = document.createElement('div');
  if(cls) line.className = cls; line.textContent = msg;
  c.appendChild(line); c.scrollTop = c.scrollHeight;
};

/* ---------- タブ ---------- */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('pane-'+t.dataset.tab).classList.add('active');
  };
});

/* ---------- 解像度セグメント ---------- */
$('resSeg').querySelectorAll('button').forEach(b=>{
  b.onclick = ()=>{
    $('resSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    GRID = parseInt(b.dataset.res);
    if(srcImg) renderBW();
  };
});

/* ---------- 画像読み込み ---------- */
$('pickBtn').onclick = ()=>{
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = e=>{
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{ const img=new Image(); img.onload=()=>{ srcImg=img; drawSource(); renderBW(); $('encBtn').disabled=false; }; img.src=r.result; };
    r.readAsDataURL(f);
  };
  inp.click();
};

function drawSource(){
  const c=$('srcCanvas'), x=c.getContext('2d');
  x.clearRect(0,0,c.width,c.height);
  // contain
  const s=Math.min(c.width/srcImg.width, c.height/srcImg.height);
  const w=srcImg.width*s, h=srcImg.height*s;
  x.drawImage(srcImg,(c.width-w)/2,(c.height-h)/2,w,h);
}

/* ---------- 2値化（焼き付け絵を作る） ---------- */
$('thresh').oninput = e=>{ $('thVal').textContent=e.target.value; if(srcImg) renderBW(); };

function renderBW(){
  const th = parseInt($('thresh').value);
  const tmp = document.createElement('canvas'); tmp.width=GRID; tmp.height=GRID;
  const tx = tmp.getContext('2d');
  tx.imageSmoothingEnabled = true;
  // contain into GRID
  const s=Math.min(GRID/srcImg.width, GRID/srcImg.height);
  const w=srcImg.width*s, h=srcImg.height*s;
  tx.fillStyle='#fff'; tx.fillRect(0,0,GRID,GRID);
  tx.drawImage(srcImg,(GRID-w)/2,(GRID-h)/2,w,h);
  const d = tx.getImageData(0,0,GRID,GRID).data;
  bwBits = new Uint8Array(GRID*GRID);
  for(let i=0;i<GRID*GRID;i++){
    const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
    const lum = 0.299*r+0.587*g+0.114*b;
    bwBits[i] = lum < th ? 1 : 0;   // 1=黒(描く), 0=白
  }
  // preview
  const c=$('bwCanvas'); c.width=GRID; c.height=GRID;
  const x=c.getContext('2d'); const im=x.createImageData(GRID,GRID);
  for(let i=0;i<GRID*GRID;i++){
    const v = bwBits[i]? 0x33 : 0x00;        // 黒画素は背景, 描画は緑
    const on = bwBits[i];
    im.data[i*4]   = on?0x4d:0x00;
    im.data[i*4+1] = on?0xff:0x0a;
    im.data[i*4+2] = on?0x7c:0x00;
    im.data[i*4+3] = 255;
  }
  x.putImageData(im,0,0);
}

/* ===================================================================
   ENCODER  : bwBits → FSK 音声(Float32) → WAV
   SRは引数で受ける(送信再生時の実サンプルレートに合わせるため)
   =================================================================== */
function tone(freq, ms, buf, phaseRef, sr){
  const n = Math.round(sr*ms/1000);
  for(let i=0;i<n;i++){
    phaseRef.p += 2*Math.PI*freq/sr;
    buf.push(Math.sin(phaseRef.p)*0.6);
  }
}
function bitTone(bit, buf, phaseRef, sr){
  tone(bit? F1 : F0, BIT_MS, buf, phaseRef, sr);
}
function pushByte(val, buf, phaseRef, sr){
  for(let b=7;b>=0;b--) bitTone((val>>b)&1, buf, phaseRef, sr);
}

function encode(sr){
  if(!bwBits){return;}
  const buf=[]; const ph={p:0};
  tone(F_SYNC, LEAD_MS, buf, ph, sr);
  for(let row=0; row<GRID; row++){
    tone(F_SYNC, SYNC_MS, buf, ph, sr);
    pushByte(GRID, buf, ph, sr);
    pushByte(row, buf, ph, sr);
    let parity=0;
    for(let col=0; col<GRID; col++){
      const bit=bwBits[row*GRID+col];
      bitTone(bit, buf, ph, sr);
      parity ^= bit<<(col%8);
    }
    pushByte(parity & 0xff, buf, ph, sr);
    const gap=Math.round(sr*ROW_GAP_MS/1000);
    for(let i=0;i<gap;i++) buf.push(0);
  }
  // 最終行を確実にコミットさせるため、終端前に長めの無音
  { const g2=Math.round(sr*120/1000); for(let i=0;i<g2;i++) buf.push(0); }
  tone(F_SYNC, 400, buf, ph, sr);
  for(let k=0;k<6;k++){ tone(F1, 60, buf, ph, sr); tone(F_SYNC, 60, buf, ph, sr); }
  tone(F_SYNC, 400, buf, ph, sr);
  return new Float32Array(buf);
}

function floatToWav(samples, sr){
  const len=samples.length;
  const ab=new ArrayBuffer(44+len*2); const dv=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF'); dv.setUint32(4,36+len*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,sr,true); dv.setUint32(28,sr*2,true); dv.setUint16(32,2,true);
  dv.setUint16(34,16,true); ws(36,'data'); dv.setUint32(40,len*2,true);
  let o=44; for(let i=0;i<len;i++){ let s=Math.max(-1,Math.min(1,samples[i])); dv.setInt16(o,s<0?s*0x8000:s*0x7fff,true); o+=2; }
  return new Blob([ab],{type:'audio/wav'});
}

let encodedSamples=null;        // 生成済みFloat32(再生用にメモリ保持)
let encodedSR=SR;               // 生成に使った実SR
let txCtx=null, txSource=null;

$('encBtn').onclick = ()=>{
  const reels=[$('reelL'),$('reelR')]; reels.forEach(r=>r.classList.add('spin'));
  setTimeout(()=>{
    // 再生に使うコンテキストを先に作り、その実SRで生成する（送受信のピッチ一致の要）
    if(!txCtx) txCtx=new (window.AudioContext||window.webkitAudioContext)();
    encodedSR = txCtx.sampleRate;
    encodedSamples=encode(encodedSR);
    encodedWav=floatToWav(encodedSamples, encodedSR);
    $('playBtn').disabled=false; $('saveBtn').disabled=false;
    reels.forEach(r=>r.classList.remove('spin'));
    const secs=(encodedSamples.length/encodedSR).toFixed(1);
    $('encBtn').textContent='🔊 再生成する（'+GRID+'×'+GRID+' / '+secs+'秒 / '+encodedSR+'Hz）';
  },300);
};

/* iOS対応: audioタグを使わず Web Audio で直接鳴らす(生成時と同じctx/SR) */
$('playBtn').onclick = ()=>{
  if(!encodedSamples) return;
  if(txSource){ try{txSource.stop();}catch(e){} txSource=null;
    $('playBtn').textContent='▶ 再生';
    $('reelL').classList.remove('spin'); $('reelR').classList.remove('spin'); return; }
  if(!txCtx) txCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(txCtx.state==='suspended') txCtx.resume();
  const buf=txCtx.createBuffer(1, encodedSamples.length, txCtx.sampleRate);
  buf.getChannelData(0).set(encodedSamples);
  txSource=txCtx.createBufferSource();
  txSource.buffer=buf; txSource.connect(txCtx.destination);
  $('playBtn').textContent='■ 停止';
  $('reelL').classList.add('spin'); $('reelR').classList.add('spin');
  txSource.onended=()=>{ txSource=null; $('playBtn').textContent='▶ 再生';
    $('reelL').classList.remove('spin'); $('reelR').classList.remove('spin'); };
  txSource.start();
};

$('saveBtn').onclick = ()=>{
  const url=URL.createObjectURL(encodedWav);
  const a=document.createElement('a'); a.href=url;
  a.download='ai-cassette-'+GRID+'x'+GRID+'.wav';
  document.body.appendChild(a); a.click(); a.remove();
  // iOSで落ちない時のため、新規タブも用意
  setTimeout(()=>{ try{window.open(url,'_blank');}catch(e){} }, 200);
};

/* ===================================================================
   DECODER : マイク → FFT(Goertzel) → ビット → ファクス描画
   =================================================================== */
let rxRunning=false, rxStream=null;
let rxGainNode=null;
let rxGot=new Set();
let rxLockedGrid=0;

/* マイク感度スライダー(スタンバイ中もリアルタイム反映) */
$('gainCtl').oninput = e=>{
  $('gainVal').textContent = e.target.value;
  if(rxGainNode) rxGainNode.gain.value = parseFloat(e.target.value);
};

/* 手動「今ある分で確定」: 歯抜けでも、揃った行で締める */
$('finalizeBtn').onclick = ()=>{
  const total = rxLockedGrid || GRID;
  const n = rxGot.size;
  $('rxStatus').textContent = '■ 手動確定 — '+n+' / '+total+' 行';
  $('rxStatus').classList.remove('live');
  log('[RX] 手動確定: '+n+'/'+total+' 行で締め','warn');
  finishReveal();
  $('finalizeBtn').disabled=true;
  rxRunning=false;
  if(rxRAF) cancelAnimationFrame(rxRAF);
  if(rxStream){ rxStream.getTracks().forEach(t=>t.stop()); rxStream=null; }
  $('listenBtn').textContent='◉ 受信スタンバイ';
};

$('listenBtn').onclick = async ()=>{
  if(rxRunning){ stopRx(); return; }
  $('rxStatus').textContent='マイクを要求中…';
  try{
    rxStream = await navigator.mediaDevices.getUserMedia({audio:{
      echoCancellation:false, noiseSuppression:false, autoGainControl:false,
      googEchoCancellation:false, googNoiseSuppression:false, googAutoGainControl:false,
      googHighpassFilter:false, googTypingNoiseDetection:false
    }});
  }catch(e){
    $('rxStatus').textContent='⚠ マイク不可: '+e.name;
    log('[RX] getUserMedia 失敗: '+e.name+' — Safariで開いてください','err');
    return;
  }
  startRx(rxStream);
};

function goertzel(samples, freq){
  const w=2*Math.PI*freq/SR, c=2*Math.cos(w);
  let s0=0,s1=0,s2=0;
  for(let i=0;i<samples.length;i++){ s0=samples[i]+c*s1-s2; s2=s1; s1=s0; }
  return s1*s1+s2*s2-c*s1*s2;
}

let rxRAF=null;
function startRx(stream){
  rxRunning=true;
  $('listenBtn').textContent='■ 停止';
  $('rxStatus').textContent='マイク取得OK — 音声待ち';
  $('rxStatus').classList.add('live');
  $('con').innerHTML=''; log('[RX] マイク取得成功. リードトーン待ち...','ok');
  clearRxCanvas();

  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const actualSR = audioCtx.sampleRate;             // iOSは48000のことが多い
  const spbR = Math.round(actualSR * BIT_MS/1000);   // 実SRに合わせる
  log('[RX] sampleRate='+actualSR+' / bit='+spbR+'sample','');

  const src = audioCtx.createMediaStreamSource(stream);
  rxGainNode = audioCtx.createGain();
  rxGainNode.gain.value = parseFloat($('gainCtl').value) || 6.0;   // ★スライダー連動
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  src.connect(rxGainNode); rxGainNode.connect(analyser);
  const tmp = new Float32Array(analyser.fftSize);

  // 周波数も実SRに合わせてGoertzel(F0/F1/F_SYNCは固定Hzなのでそのまま)
  let acc=[];
  let state='lead'; let leadCount=0;
  rxLockedGrid=0;                   // 0=未確定。最初の正常行で確定(モジュール変数)
  rxGot=new Set();
  let curBits=[]; let collecting=false;
  let cbCount=0, sawAudio=false;
  const MAXBITS = 8+8+32+8;          // grid+row+最大画素+parity ぶん集める
  $('finalizeBtn').disabled=false;
  $('rxProgress').textContent='受信 0 行';

  function gz(arr,freq){
    const w=2*Math.PI*freq/actualSR, c=2*Math.cos(w);
    let s1=0,s2=0,s0;
    for(let i=0;i<arr.length;i++){ s0=arr[i]+c*s1-s2; s2=s1; s1=s0; }
    return s1*s1+s2*s2-c*s1*s2;
  }
  function readByte(a,o){ let v=0; for(let b=0;b<8;b++) v=(v<<1)|a[o+b]; return v; }

  function tryCommitRow(){
    // フォーマット: grid(8) row(8) px(grid) parity(8)
    if(curBits.length < 8+8+8){ collecting=false; curBits=[]; return; }
    const g = readByte(curBits,0);                 // 先頭=グリッドサイズ
    if(g!==16 && g!==24 && g!==32){ collecting=false; curBits=[]; return; } // 異常gridは捨てる
    const need = 8+8+g+8;
    if(curBits.length < need){ collecting=false; curBits=[]; return; }
    const rowIdx = readByte(curBits,8);
    const px = curBits.slice(16,16+g);
    const parRecv = readByte(curBits,16+g);
    let par=0; for(let col=0;col<g;col++) par^=px[col]<<(col%8);
    collecting=false; curBits=[];
    if(rowIdx>=g){ return; }
    if((par&0xff)!==parRecv){ log('[RX] row '+rowIdx+' 化け → 飛ぶ','err'); if(rxLockedGrid) flashRowGlitch(rowIdx); return; }
    // ここまで来たら正常行。グリッド確定
    if(!rxLockedGrid){
      rxLockedGrid=g; GRID=g; clearRxCanvas();
      log('[RX] グリッド自動検出: '+g+'×'+g,'ok');
    }
    if(g!==rxLockedGrid) return;       // 違うgridの行は無視
    if(rxGot.has(rowIdx)) return;
    rxGot.add(rowIdx); drawRow(rowIdx,px);
    $('rxProgress').textContent='受信 '+rxGot.size+' / '+rxLockedGrid+' 行';
    log('[RX] row '+String(rowIdx).padStart(2,'0')+' ▒▒ 描画','ok');
    if(rxGot.size>=rxLockedGrid){
      $('rxStatus').textContent='★ 受信完了 ★ '+rxLockedGrid+'×'+rxLockedGrid;
      $('rxStatus').classList.remove('live'); finishReveal();
      $('finalizeBtn').disabled=true;
    }
  }

  function loop(){
    if(!rxRunning) return;
    analyser.getFloatTimeDomainData(tmp);
    cbCount++;
    let pk=0; for(let i=0;i<tmp.length;i++){ const a=Math.abs(tmp[i]); if(a>pk)pk=a; }
    $('lvl').style.width=Math.min(100,pk*300)+'%';   // メーターを敏感に
    if(pk>0.004 && !sawAudio){ sawAudio=true; $('rxStatus').textContent='音を検知 — 復調中'; log('[RX] 音声入力を検知 (lvl='+pk.toFixed(3)+')','ok'); }
    if(cbCount===60 && !sawAudio) log('[RX] 音が弱い/来ていません — 音量UP・距離を詰めて','warn');

    for(let i=0;i<tmp.length;i++) acc.push(tmp[i]);
    // 診断: 同期前の間、1秒おきに各周波数の届き具合を表示
    if(state==='lead' && cbCount%60===0 && acc.length>=spbR){
      const ck=acc.slice(0,spbR);
      const d0=gz(ck,F0),d1=gz(ck,F1),ds=gz(ck,F_SYNC);
      const sm=d0+d1+ds+1e-12; const mxd=Math.max(d0,d1,ds);
      log('[診断] lvl='+pk.toFixed(3)+' SYNC比='+(ds/sm).toFixed(2)+' (1に近いほど良)','');
    }
    while(acc.length>=spbR){
      const chunk=acc.slice(0,spbR); acc=acc.slice(spbR);
      const p0=gz(chunk,F0), p1=gz(chunk,F1), ps=gz(chunk,F_SYNC);
      const mx=Math.max(p0,p1,ps);
      const sum=p0+p1+ps+1e-12;
      // 無音判定: 絶対値ではなく「最大が全体に占める割合」で見る(マイクの弱信号対応)
      // さらに、入力レベル自体が極小(本当の無音)も拾う
      if(pk<0.0015 || mx/sum < 0.40){ if(collecting && curBits.length>0) tryCommitRow(); continue; }
      if(ps===mx){
        if(state==='lead'){ leadCount++; if(leadCount>3){ state='row'; log('[RX] 同期OK. 受信開始','ok'); } }
        else { if(collecting && curBits.length>0) tryCommitRow(); collecting=true; curBits=[]; }
        continue;
      }
      if(state==='row'){
        if(!collecting){ collecting=true; curBits=[]; }
        // ★1ビット区間を3分割して多数決(完全一致は狙わず、優勢な方を採る)
        const third = Math.floor(spbR/3);
        let votes=0;
        for(let s=0;s<3;s++){
          const sub = chunk.slice(s*third, (s+1)*third);
          const q0=gz(sub,F0), q1=gz(sub,F1);
          if(q1>q0) votes++;   // F1寄り=1票
        }
        curBits.push(votes>=2 ? 1 : 0);   // 3回中2回以上が1なら1
        const target = rxLockedGrid ? (8+8+rxLockedGrid+8) : MAXBITS;
        if(curBits.length>=target) tryCommitRow();
      }
    }
    rxRAF=requestAnimationFrame(loop);
  }
  rxRAF=requestAnimationFrame(loop);
}

function stopRx(){
  rxRunning=false;
  if(rxRAF) cancelAnimationFrame(rxRAF);
  $('listenBtn').textContent='◉ 受信スタンバイ';
  $('rxStatus').classList.remove('live');
  if(rxStream){ rxStream.getTracks().forEach(t=>t.stop()); rxStream=null; }
  if(audioCtx){ audioCtx.close(); audioCtx=null; }
}


/* ---------- ファクス描画 ---------- */
function clearRxCanvas(){
  const c=$('rxCanvas'); c.width=GRID; c.height=GRID;
  const x=c.getContext('2d'); x.fillStyle='#000'; x.fillRect(0,0,GRID,GRID);
}
function drawRow(row, px){
  const c=$('rxCanvas'); const x=c.getContext('2d');
  for(let col=0;col<px.length;col++){
    x.fillStyle = px[col] ? '#4dff7c' : '#000';
    x.fillRect(col,row,1,1);
  }
  // 走査線フラッシュ
  x.fillStyle='rgba(77,255,124,0.5)'; x.fillRect(0,row,GRID,1);
  setTimeout(()=>{ const xx=$('rxCanvas').getContext('2d');
    for(let col=0;col<px.length;col++){ xx.fillStyle=px[col]?'#4dff7c':'#000'; xx.fillRect(col,row,1,1);} },80);
}
function flashRowGlitch(row){
  const c=$('rxCanvas'); const x=c.getContext('2d');
  for(let col=0;col<GRID;col++){ x.fillStyle=Math.random()>0.5?'#ff5a5a':'#000'; x.fillRect(col,row,1,1); }
}
function finishReveal(){
  const c=$('rxCanvas'); c.style.transition='filter .4s'; c.style.filter='drop-shadow(0 0 8px #4dff7c)';
}
</script>
